name: Publish Redis RPM
on: workflow_dispatch
permissions:
  contents: write
jobs:
  p:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.REDIS_RELEASE_TOKEN }}
        run: gh release download redis-8.8.0-el10 -R techhead-datnextcom/api_server_ws_resources -p '*.rpm'
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create redis-8.8.0-el10 *.rpm -