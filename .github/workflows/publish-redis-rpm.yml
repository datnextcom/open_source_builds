name: Publish Redis RPM to GitHub Pages

run-name: Publish ${{ inputs.asset_name }} from ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag in the private source repository
        required: true
        type: string
        default: redis-8.8.0-el10
      asset_name:
        description: Exact RPM release asset filename
        required: true
        type: string
        default: redis-8.8.0-1.el10.x86_64.rpm

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: techhead-datnextcom/api_server_ws_resources

jobs:
  prepare:
    name: Download and prepare RPM site
    runs-on: ubuntu-latest

    steps:
      - name: Validate configured secret
        env:
          REDIS_RELEASE_TOKEN: ${{ secrets.REDIS_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${REDIS_RELEASE_TOKEN:-}" ]]; then
            echo "The REDIS_RELEASE_TOKEN repository secret is missing or empty."
            exit 1
          fi

      - name: Download RPM from private release
        env:
          GH_TOKEN: ${{ secrets.REDIS_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET_NAME: ${{ inputs.asset_name }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p site

          gh release download "$RELEASE_TAG" \
            --repo "$SOURCE_REPOSITORY" \
            --pattern "$ASSET_NAME" \
            --dir site \
            --clobber

          test -f "site/$ASSET_NAME"
          echo "Downloaded asset:"
          ls -lh "site/$ASSET_NAME"

      - name: Generate checksum and download page
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}