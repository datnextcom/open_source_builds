name: Publish Redis RPM to GitHub Pages

run-name: Publish ${{ inputs.asset_name }} from ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag in the private source repository
        required: true
        type: string
        default: redis-8.8.0-el10
      asset_name:
        description: Exact RPM release asset filename
        required: true
        type: string
        default: redis-8.8.0-1.el10.x86_64.rpm