name: Publish Redis RPM
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download private RPM
        env:
          GH_TOKEN: ${{ secrets.REDIS_RELEASE_TOKEN }}
        run: |
          mkdir dist
          gh release download redis-8.8.0-el10 --repo techhead-datnextcom/api_server_ws_resources --pattern 'redis-8