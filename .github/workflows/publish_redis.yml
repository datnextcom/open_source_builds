name: Publish Redis RPM to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download RPM from private release
        env:
          GH_TOKEN: ${{ secrets.REDIS_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p site

          gh release download redis-8.8.0-el10 \
            --repo techhead-datnextcom/api_server_ws_resources \
            --pattern "redis-8.8.0-1.el10.x86_64.rpm" \
            --dir site

          test -f "site/redis-8.8.0-1.el10.x86_64.rpm"

          cd site

          sha256sum redis-8.8.0-1.el10.x86_64.rpm > SHA256SUMS

          touch .nojekyll

          cat > index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Redis RPM Downloads</title>
          </head>
          <body>
            <h1>Redis 8.8.0 for Enterprise Linux 10</h1>

            <p>
              <a href="redis-8.8.0-1.el10.x86_64.rpm">
                Download redis-8.8.0-1.el10.x86_64.rpm
              </a>
            </p>

            <p>
              <a href="SHA256SUMS">
                SHA-256 checksum
              </a>
            </p>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
